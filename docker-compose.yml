services:
  postgres:
    image: postgres:16
    container_name: kdbs2-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kdbs2
    ports:
      # Host 55432 -> container 5432. Non-standard host port avoids colliding
      # with any other Postgres already running on the machine.
      - "55432:5432"
    volumes:
      - kdbs2-pgdata:/var/lib/postgresql/data
      # On FIRST start of an empty volume, Postgres runs the *.sql files here in
      # filename order. Mount ONLY schema + seed (numbered) so the bundle is
      # self-seeding; backup.sql and anything else in db/ is deliberately excluded.
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

volumes:
  kdbs2-pgdata:
