services:
  postgres:
    image: postgres:16
    container_name: kdbs2-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kdbs2
    ports:
      # Host 55432 -> container 5432. Non-standard host port avoids colliding
      # with any other Postgres already running on the machine.
      - "55432:5432"
    volumes:
      - kdbs2-pgdata:/var/lib/postgresql/data
      # On FIRST start of an empty volume, Postgres runs every *.sql here in
      # alphabetical order: schema.sql then seed.sql. Makes the bundle
      # self-seeding — `docker compose up` gives a teacher a ready database.
      - ./backend/db:/docker-entrypoint-initdb.d:ro

volumes:
  kdbs2-pgdata:
